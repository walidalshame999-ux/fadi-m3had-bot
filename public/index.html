<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإدارة العامة - معهد الفتح</title>
    <style>
        :root { --primary: #2c3e50; --accent: #2980b9; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; direction: rtl; }
        .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: right; }
        th { background: var(--primary); color: white; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div class="grid">
    <div class="sidebar">
        <div class="card">
            <h3>⚙️ تحكم الذكاء والوقت</h3>
            <label>وقت الفتح:</label> <input type="number" id="workStart" value="8">
            <label>وقت الإغلاق:</label> <input type="number" id="workEnd" value="20">
            <label>أمر الإغلاق (AI):</label>
            <textarea id="aiCommand" rows="3"></textarea>
            <label>ملاحظة ذكية (رد على العلامات):</label>
            <textarea id="customNote" rows="2"></textarea>
            <button onclick="saveConfig()">حفظ الإعدادات</button>
        </div>
    </div>

    <div class="main">
        <div class="card">
            <h3>👥 إدارة الطلاب المسجلين</h3>
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>السكن</th>
                        <th>المواليد</th>
                        <th>الدراسة</th>
                        <th>الوقت المفضل</th>
                        <th>الهاتف</th>
                    </tr>
                </thead>
                <tbody id="studentBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function loadAdmin() {
        const res = await fetch('/api/admin');
        const data = await res.json();
        
        // تعبئة الإعدادات
        document.getElementById('aiCommand').value = data.botConfig.aiCommand;
        document.getElementById('customNote').value = data.botConfig.customNote;
        
        // تعبئة الجدول
        const tbody = document.getElementById('studentBody');
        tbody.innerHTML = data.registrations.map(r => `
            <tr>
                <td>${r.name}</td>
                <td>${r.address}</td>
                <td>${r.dob}</td>
                <td>${r.job}</td>
                <td>${r.timePref}</td>
                <td>${r.phone.split('@')[0]}</td>
            </tr>
        `).join('');
    }

    async function saveConfig() {
        const config = {
            workStart: parseInt(document.getElementById('workStart').value),
            workEnd: parseInt(document.getElementById('workEnd').value),
            aiCommand: document.getElementById('aiCommand').value,
            customNote: document.getElementById('customNote').value
        };
        await fetch('/api/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(config)
        });
        alert('تم الحفظ بنجاح!');
    }

    setInterval(loadAdmin, 5000);
    loadAdmin();
</script>
</body>
</html>

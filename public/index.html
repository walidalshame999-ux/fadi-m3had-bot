<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة معهد الفتح | نظام الإكسل والذكاء</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; direction: rtl; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-excel { background: #1d6f42; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-family: inherit; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: right; }
        th { background: #1877f2; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛠 بنك المعلومات (سطر لكل أمر)</h2>
    <textarea id="aiKnowledge" rows="6"></textarea>
    <button onclick="saveConfig()" style="margin-top:10px; background:#1877f2; color:white; border:none; padding:10px 20px; border-radius:5px;">حفظ الإعدادات</button>
</div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>📊 الطلاب المسجلين</h3>
        <button class="btn-excel" onclick="exportToExcel()">تصدير Excel احترافي 📥</button>
    </div>
    <table id="studentTable">
        <thead>
            <tr>
                <th>الاسم الثلاثي</th>
                <th>العمر</th>
                <th>السكن</th>
                <th>العمل</th>
                <th>الدراسة</th>
                <th>رقم الواتساب</th>
            </tr>
        </thead>
        <tbody id="regTable"></tbody>
    </table>
</div>

<script>
    let currentRegs = [];

    async function fetchData() {
        const res = await fetch('/api/system');
        const data = await res.json();
        currentRegs = data.registrations;
        document.getElementById('aiKnowledge').value = data.botConfig.aiKnowledge;

        document.getElementById('regTable').innerHTML = data.registrations.map(r => `
            <tr>
                <td>${r.name}</td>
                <td>${r.age}</td>
                <td>${r.address || '-'}</td>
                <td>${r.job}</td>
                <td>${r.study}</td>
                <td>${r.phone}</td>
            </tr>
        `).join('');
    }

    function exportToExcel() {
        if(currentRegs.length === 0) return alert("لا يوجد بيانات لتصديرها");
        
        const dataForExcel = currentRegs.map(r => ({
            "الاسم الثلاثي": r.name,
            "العمر": r.age,
            "سنة التولد": r.birthYear,
            "السكن": r.address,
            "العمل الحالي": r.job,
            "الدراسة": r.study,
            "رقم التواصل": r.phone,
            "تاريخ التسجيل": r.regDate
        }));

        const ws = XLSX.utils.json_to_sheet(dataForExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "طلاب معهد الفتح");
        XLSX.writeFile(wb, "قائمة_طلاب_المعهد.xlsx");
    }

    async function saveConfig() {
        const payload = { aiKnowledge: document.getElementById('aiKnowledge').value };
        await fetch('/api/update-config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert('تم الحفظ!');
    }

    fetchData();
    setInterval(fetchData, 10000);
</script>
</body>
</html>

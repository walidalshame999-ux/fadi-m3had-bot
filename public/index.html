<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة طلاب معهد الفتح</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background: #34495e; color: white; }
        tr:hover { background: #f9f9f9; }
        .status-open { color: #27ae60; font-weight: bold; }
        .status-sleep { color: #e67e22; font-weight: bold; }
        .refresh-btn { background: #2980b9; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>نظام معهد الفتح الخيري 🤖</h1>
        <p>متابعة طلبات التسجيل والرد الآلي</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>حالة البوت الآن</h3>
            <div id="botStatus" class="">جاري التحقق...</div>
        </div>
        <div class="stat-card">
            <h3>إجمالي المسجلين</h3>
            <div id="regCount" style="font-size: 24px; font-weight: bold;">0</div>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadData()">تحديث البيانات 🔄</button>

    <table>
        <thead>
            <tr>
                <th>رقم الهاتف</th>
                <th>تفاصيل التسجيل</th>
                <th>الوقت</th>
            </tr>
        </thead>
        <tbody id="studentTable">
            </tbody>
    </table>
</div>

<script>
    async function loadData() {
        try {
            const response = await fetch('/api/data');
            const data = await response.json();
            
            // تحديث الإحصائيات
            document.getElementById('regCount').innerText = data.count;
            const statusDiv = document.getElementById('botStatus');
            statusDiv.innerText = data.status === "work" ? "قيد العمل (رد طبيعي) ✅" : "وضع النوم (رد المدير نائم) 😴";
            statusDiv.className = data.status === "work" ? "status-open" : "status-sleep";

            // تحديث الجدول
            const tableBody = document.getElementById('studentTable');
            tableBody.innerHTML = '';
            
            data.registrations.reverse().forEach(reg => {
                const row = `<tr>
                    <td>${reg.phone.replace('@c.us', '')}</td>
                    <td>${reg.details}</td>
                    <td>${reg.time}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        } catch (err) {
            console.error("خطأ في جلب البيانات:", err);
        }
    }

    // تحديث تلقائي كل 30 ثانية
    setInterval(loadData, 30000);
    loadData();
</script>

</body>
</html>
